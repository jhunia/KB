<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KB Admin — Secure Login</title> <!-- KB Admin Portal Login -->
  <style>
    :root {
      --bg: #FAFAFA;
      --card-bg: #FFFFFF;
      --text-main: #1A1A1A;
      --text-sub: #666666;
      --border: #E5E7EB;
      --primary: #000000;
      --primary-hover: #333333;
      --error: #EF4444;
      --radius-lg: 12px;
      --radius-md: 8px;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .brand-logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo span {
      color: var(--text-sub);
      font-weight: 400;
      font-size: 20px;
    }

    .login-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    p.subtitle {
      color: var(--text-sub);
      text-align: center;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-sub);
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      transition: all 0.2s ease;
      background: var(--bg);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card-bg);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 12px;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    .error-msg {
      color: var(--error);
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
      background: rgba(239, 68, 68, 0.1);
      padding: 10px;
      border-radius: var(--radius-md);
    }

    .return-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--text-sub);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s ease;
    }

    .return-link:hover {
      color: var(--primary);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="brand-logo">KB.ENT <span>Admin</span></div>
    
    <div class="login-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Enter your credentials to access the portal</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@kb.ent" required />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-submit">Sign In securely</button>
      </form>
    </div>

    <a href="/" class="return-link">← Return to Storefront</a>
  </div>

  <script type="module" src="/admin/js/login.js"></script>
</body>
</html>
