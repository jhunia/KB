<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB — Authentication</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner" style="justify-content:center;">
      <a href="/" class="logo">KB.ENT</a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-box">
        
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin">Login</button>
          <button class="auth-tab" id="tabSignup">Sign Up</button>
        </div>

        <div id="authAlert" class="auth-alert hidden"></div>


        <form id="loginForm" class="auth-form active">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-desc">Enter your details to access your KB account.</p>
          
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="demo@kb.ent" required />
          </div>
          
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>

          <button type="submit" class="auth-btn">Log In</button>
          
          <!-- Provide dummy credentials to help user seamlessly -->
          <p style="text-align:center; font-size:12px; color:#999; margin-top:16px;">Demo config: demo@kb.ent / password123</p>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="auth-form">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-desc">Join KB to start managing your orders and wishlist.</p>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="John Doe" required />
          </div>
          
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label>MoMo Number (Phone)</label>
            <input type="tel" id="signupPhone" placeholder="024XXXXXXX" required />
          </div>
          
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="••••••••" required />
          </div>

          <button type="submit" class="auth-btn">Sign Up</button>
        </form>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer" style="padding-top:40px;">
    <div class="container">
      <div class="footer-bottom" style="border-top:none;">
        <p class="footer-copyright" style="margin: 0 auto;">KB.ENT &copy; 2000-2026, All Rights Reserved</p>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
